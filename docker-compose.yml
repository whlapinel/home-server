services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    profiles:
      - local
    network_mode: host
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
  grav:
    container_name: grav
    image: getgrav/grav
    ports:
      - "1066:80"
    volumes:
      - ${DATA_PATH:-.}/grav-site:/var/www/html
    restart: unless-stopped
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./site:/var/www
    env_file:
      - .env
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    profiles:
      - local
    volumes:
      - ~/adguard/work:/opt/adguardhome/work
      - ~/adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp"
    env_file:
      - .env
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
    volumes:
      - ~/.wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    env_file:
      - .env
  vikunja:
    container_name: vikunja
    image: vikunja/vikunja:2.1.0
    ports:
      - 3456:3456
    volumes:
      - ${DATA_PATH:-.}/vikunja-files:/app/vikunja/files
      - ${DATA_PATH:-.}/vikunja-db:/db
    restart: unless-stopped
    env_file:
      - .env
  donetick:
    image: donetick/donetick
    container_name: donetick
    restart: unless-stopped
    ports:
      - "2021:2021"
    volumes:
      - ${DATA_PATH:-.}/donetick-data:/donetick-data
      - ${DATA_PATH:-.}/donetick-config:/config
    env_file:
      - .env
  actual_server:
    container_name: actual
    image: docker.io/actualbudget/actual-server:latest
    ports:
      # This line makes Actual available at port 5006 of the device you run the server on,
      # i.e. http://localhost:5006. You can change the first number to change the port, if you want.
      - '5006:5006'
    volumes:
      # Change './actual-data' below to the path to the folder you want Actual to store its data in on your server.
      # '/data' is the path Actual will look for its files in by default, so leave that as-is.
      - ${DATA_PATH:-.}/actual-data:/data
    healthcheck:
      # Enable health check for the instance
      test: ['CMD-SHELL', 'node src/scripts/health-check.js']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: $VW_DOMAIN
      SMTP_HOST: $VW_SMTP_HOST
      SMTP_PORT: $VW_SMTP_PORT         
      SMTP_SECURITY: $VW_SMTP_SECURITY                                                                                                                                                                              
      SMTP_FROM: $VW_SMTP_FROM
      SMTP_FROM_NAME: $VW_SMTP_FROM_NAME
      SMTP_USERNAME: $VW_SMTP_USERNAME
      SMTP_PASSWORD: $VW_SMTP_PASSWORD
    volumes:
      - ${DATA_PATH:-.}/vw-data:/data/
    ports:
      - 8000:80

  paperless-broker:
    image: docker.io/library/redis:8
    container_name: paperless-broker
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-.}/paperless/redis:/data
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - paperless-broker
    ports:
      - "8010:8000"
    volumes:
      - ${DATA_PATH:-.}/paperless/data:/usr/src/paperless/data
      - ${DATA_PATH:-.}/paperless/media:/usr/src/paperless/media
      - ${DATA_PATH:-.}/paperless/export:/usr/src/paperless/export
      - ${DATA_PATH:-.}/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBENGINE: sqlite
      PAPERLESS_URL: ${PAPERLESS_URL:-}
    env_file:
      - .env

volumes:
  caddy_data:
  caddy_config:
