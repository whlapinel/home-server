services:
  # Use remote-specific Caddyfile with internal TLS and service-name upstreams
  caddy:
    volumes:
      - ./Caddyfile.remote:/etc/caddy/Caddyfile
    env_file:
      - /etc/home-server/.env

  # Remove host port publishes; reachable via Caddy inside VPN
  grav:
    ports: []
    env_file:
      - /etc/home-server/.env
  vikunja:
    ports: []
    env_file:
      - /etc/home-server/.env
  donetick:
    ports: []
    env_file:
      - /etc/home-server/.env
  actual_server:
    ports: []
    env_file:
      - /etc/home-server/.env

  adguardhome:
    env_file: []

  # Explicitly keep wg-easy; UI is only reachable via VPN (no SG rule for 51821/tcp)
  wg-easy:
    volumes:
      - /root/.wg-easy:/etc/wireguard
    env_file:
      - /etc/home-server/.env
    
