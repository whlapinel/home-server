services:
  # Use remote-specific Caddyfile with Let's Encrypt DNS challenge via Route53
  caddy:
    build: ./caddy
    image: home-server-caddy:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile.remote:/etc/caddy/Caddyfile
    env_file:
      - /etc/home-server/.env

  # Remove host port publishes; reachable via Caddy inside VPN
  grav:
    ports: []
    env_file:
      - /etc/home-server/.env
  vikunja:
    ports: []
    env_file:
      - /etc/home-server/.env
  donetick:
    ports: []
    env_file:
      - /etc/home-server/.env
  actual_server:
    ports: []
    env_file:
      - /etc/home-server/.env

  impostor:
    build: ./impostor
    restart: unless-stopped

  # Run wg-easy in host network mode so wg0 (10.8.0.1) lives on the host,
  # allowing Docker's iptables rules to forward VPN traffic to other containers.
  wg-easy:
    network_mode: host
    ports: []
    volumes:
      - /root/.wg-easy:/etc/wireguard
    env_file:
      - /etc/home-server/.env

  vaultwarden:
    ports: []
    env_file:
      - /etc/home-server/.env
    
