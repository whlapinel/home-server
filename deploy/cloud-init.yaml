#cloud-config
package_update: true
package_upgrade: true
packages:
  - docker.io
  - docker-compose-plugin
  - git
  - awscli

runcmd:
  - |
    set -euxo pipefail
    # Allow 'ubuntu' user to run docker
    if id ubuntu >/dev/null 2>&1; then
      usermod -aG docker ubuntu || true
    fi
    systemctl enable docker
    systemctl start docker

    # Prepare directories
    mkdir -p /etc/home-server
    mkdir -p /opt/home-server

    # Fetch env file from SSM Parameter Store (SecureString supported)
    if command -v aws >/dev/null 2>&1; then
      aws ssm get-parameter \
        --region ${AWS_REGION:-us-east-2} \
        --name "/home-server/.env" \
        --with-decryption \
        --query 'Parameter.Value' \
        --output text > /etc/home-server/.env || true
    fi

    # Optionally clone repo if REPO_URL is provided via instance user-data or env
    if [ -n "${REPO_URL:-}" ]; then
      if [ ! -d /opt/home-server/.git ]; then
        git clone "$REPO_URL" /opt/home-server
      else
        cd /opt/home-server && git pull --ff-only
      fi
    fi

    # If compose files exist, start the stack (remote override)
    if [ -f /opt/home-server/docker-compose.yml ] && [ -f /opt/home-server/docker-compose.remote.yml ]; then
      cd /opt/home-server
      docker compose -f docker-compose.yml -f docker-compose.remote.yml --env-file /etc/home-server/.env up -d
    fi

final_message: "Home server bootstrap complete."

